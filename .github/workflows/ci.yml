name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff) — agent-core only
        run: uv run ruff check packages/agent-core/

      - name: Format check (ruff) — agent-core only
        run: uv run ruff format --check packages/agent-core/

      - name: Test
        run: uv run pytest packages/agent-core/ -x --tb=short
