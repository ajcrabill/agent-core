[project]
name = "agent-core"
version = "0.0.1"
description = "Platform library for personal and team AI agents (dcos-agent, ikb-agent)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "AJ Crabill" }]
keywords = ["ai-agent", "personal-assistant", "knowledge-base", "supervised-learning"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    # Data layer
    "sqlmodel>=0.0.22",
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    # SQLite is stdlib; postgres deps moved to optional [postgres]
    # Vault watcher
    "watchdog>=4",
    # CLI / config
    "click>=8.1",
    "pyyaml>=6",
    "rich>=13",
    # Secrets (OS keychain default)
    "keyring>=25",
    # Mesh transport (Sprint 6, but cheap to install now)
    "httpx>=0.27",
    "pynacl>=1.5",
    # Web API for UI plugins (Sprint 11 — OpenWebUI fork talks to this)
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[project.optional-dependencies]
postgres = [
    "psycopg[binary]>=3.2",
    "pgvector>=0.3",
]
sqlite-vec = [
    "sqlite-vec>=0.1.6",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
    "mypy>=1.11",
    "httpx>=0.27",  # FastAPI's TestClient depends on it
]

[project.scripts]
# Locked when Sprint 8 lands the CLI
# "agent-core" = "agent_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent_core"]
