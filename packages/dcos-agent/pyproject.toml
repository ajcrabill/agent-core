[project]
name = "dcos-agent"
version = "0.0.1"
description = "Personal AI chief of staff. Single-user. Built on agent-core."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "AJ Crabill" }]
keywords = ["ai-agent", "personal-assistant", "chief-of-staff", "email-triage"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "agent-core",
]

[project.scripts]
dcos = "dcos_agent.cli:main"

[tool.uv.sources]
agent-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dcos_agent"]
