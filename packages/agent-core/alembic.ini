; agent-core Alembic config.
;
; The migration environment lives at agent_core/state/migrations/, so it ships
; as part of the package. Programmatic invocation via Database.upgrade() is the
; supported path; this .ini exists for dev convenience (alembic CLI usage).
;
; Only `script_location` is read by the loader — the URL is supplied by the
; calling code (or via env vars / CLI args for ad-hoc work).

[alembic]
script_location = agent_core/state/migrations

; Default URL — used only when invoking the alembic CLI directly without
; specifying -x url=…. Production usage goes through Database.upgrade().
sqlalchemy.url = sqlite:///./agent-dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
