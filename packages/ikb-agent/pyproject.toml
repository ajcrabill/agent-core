[project]
name = "ikb-agent"
version = "0.0.1"
description = "Team intelligent knowledge base. Small-team multi-user. Built on agent-core."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "AJ Crabill" }]
keywords = ["ai-agent", "knowledge-base", "semantic-search", "team-tools"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "agent-core[postgres]",
]

[project.scripts]
ikb = "ikb_agent.cli:main"

[tool.uv.sources]
agent-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ikb_agent"]
